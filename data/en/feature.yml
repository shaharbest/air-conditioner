  title: Why Philadelphia Homeowners Choose Us
  content: "Philly Green Clean was built on one simple idea: every family deserves
    a home with clean air and safe systems. We bring that commitment to every job
    in Philadelphia and the surrounding communities."
  feature_item:
    - title: Certified Technicians
      icon: ti-id-badge
      content: Our team is trained and certified in air duct, dryer vent, and chimney
        cleaning — so you know the job is done to the highest standard.

    - title: Upfront, Flat-Rate Pricing
      icon: ti-money
      content: We quote before we start. No hidden fees, no surprise add-ons. The
        price we give you is the price you pay.

    - title: Locally Owned & Operated
      icon: ti-location-pin
      content: We're a local Philadelphia-area business — not a franchise. When
        you call us, you talk to someone who actually knows your neighborhood.

    - title: 100% Satisfaction Guarantee
      icon: ti-thumb-up
      content: We're not done until you're happy. If you're not satisfied with the
        results, we'll come back and make it right at no extra charge.
