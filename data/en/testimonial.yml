    - name: Karen M.
      image: images/client/client-1.jpg
      image_webp: images/client/client-1.webp
      date: South Philadelphia
      content: I had no idea how dirty my air ducts were until Philly Green Clean
        showed me the before-and-after. The technician was professional, on time,
        and took the time to explain everything. My allergies have been noticeably
        better since. Highly recommend!

    - name: David R.
      image: images/client/client-2.jpg
      image_webp: images/client/client-2.webp
      date: Roxborough
      content: Called them after my dryer was taking two cycles to dry a single load.
        Turned out the vent was completely packed with lint. They cleared it out
        in under an hour and the difference was immediate. Great service, fair price.

    - name: Michelle T.
      image: images/client/client-1.jpg
      image_webp: images/client/client-1.webp
      date: Chestnut Hill
      content: Booked a chimney cleaning before the winter season. The team was
        thorough, neat, and left zero mess behind. They also caught a small crack
        in the flue liner and fixed it on the spot. This is exactly the kind of
        local business I want to support.
