backend:
  name: git-gateway
  repo: shaharbest/air-conditioner
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/5b0cdc16-fdc7-4702-8b0b-138bc51697af/pkce
  auth_token_endpoint: /sites/5b0cdc16-fdc7-4702-8b0b-138bc51697af/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://phillygreenclean.com

media_folder: static/images
public_folder: /images

collections:
  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    filter: { field: "draft", value: false }
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: true }
      - { label: "Sort Order", name: "weight", widget: "number", default: 1 }
      - { label: "Social Preview Image", name: "og_image", widget: "image", required: false, hint: "Overrides the default social image when this service page is shared." }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Contact Info"
        name: "contact"
        file: "data/contact.yaml"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Contact Button Link", name: "contact_button_link", widget: "string", default: "contact" }

      - label: "Features"
        name: "features"
        file: "data/features.json"
        fields:
          - label: "Features"
            name: "features"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }

      - label: "Social Previews (SEO)"
        name: "seo"
        file: "data/seo.yaml"
        fields:
          - label: "Default Social Image"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Recommended: 1200×630px JPG. Shown when any page is shared on WhatsApp, Facebook, Slack, iMessage, etc."
          - label: "Default Social Description"
            name: "og_description"
            widget: "text"
            required: false
            hint: "Shown under the title in social previews. Falls back to the page description if set."
          - label: "Twitter/X Handle"
            name: "twitter_site"
            widget: "string"
            required: false
            hint: "Include the @ symbol, e.g. @phillygreenclean"
          - label: "Twitter Card Style"
            name: "twitter_card"
            widget: "select"
            options: ["summary_large_image", "summary"]
            default: "summary_large_image"
            hint: "summary_large_image shows a big banner image — recommended."

      - label: "Homepage"
        name: "homepage"
        file: "content/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Meta Title", name: "meta_title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Social Preview Image", name: "og_image", widget: "image", required: false, hint: "Overrides the default social image for this page only." }
          - { label: "Hero Image", name: "intro_image", widget: "image", required: false }
          - { label: "Hero Image Absolute Position", name: "intro_image_absolute", widget: "boolean", default: true, required: false }
          - { label: "Hero Image Hide on Mobile", name: "intro_image_hide_on_mobile", widget: "boolean", default: true, required: false }
          - { label: "Body", name: "body", widget: "markdown" }
          - { label: "About Section Heading", name: "about_heading", widget: "string", required: false, hint: "Heading for the About section on the homepage." }
          - { label: "About Section Body", name: "about_body", widget: "text", required: false, hint: "2-3 sentences about the business — shown on the homepage." }
          - label: "About Section Bullet Points"
            name: "about_bullets"
            widget: "list"
            required: false
            hint: "Trust/credential points shown as a checklist (e.g. 'Licensed & insured', '10 years in business')."

      - label: "Testimonials"
        name: "testimonials"
        file: "data/testimonials.json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            required: false
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Customer Name", name: "name", widget: "string", hint: "First name or alias, e.g. 'John D.' or 'Homeowner in South Philly'" }
              - { label: "Neighborhood / City", name: "location", widget: "string", required: false }
              - { label: "Service Used", name: "service", widget: "select", options: ["Air Duct Cleaning", "Dryer Vent Cleaning", "Chimney Cleaning"], required: false }

      - label: "Business Hours"
        name: "hours"
        file: "data/hours.json"
        fields:
          - label: "Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Closed", name: "closed", widget: "boolean", default: false, required: false }
              - { label: "Opens", name: "opens", widget: "string", required: false, hint: "24-hour format, e.g. 09:00. Leave empty if closed." }
              - { label: "Closes", name: "closes", widget: "string", required: false, hint: "24-hour format, e.g. 17:00. Leave empty if closed." }

      - label: "About Page"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Social Preview Image", name: "og_image", widget: "image", required: false, hint: "Overrides the default social image for this page only." }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "FAQ"
        name: "faq"
        file: "data/faq.json"
        fields:
          - label: "Questions & Answers"
            name: "items"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "text" }

      - label: "Services Page"
        name: "services_index"
        file: "content/services/_index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Contact Page"
        name: "contact_page"
        file: "content/contact.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Social Preview Image", name: "og_image", widget: "image", required: false, hint: "Overrides the default social image for this page only." }
          - { label: "Body", name: "body", widget: "markdown" }
