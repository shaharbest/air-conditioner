<div class="call">
  <div class="call-box-top">
    <p class="call-tagline">Contact Us</p>
    {{ if hugo.Data.contact.phone }}
    <div class="call-phone">
      <a href="tel:{{ hugo.Data.contact.phone | replaceRE "[^0-9+]" "" }}">{{ hugo.Data.contact.phone }}</a>
    </div>
    {{ end }}
    {{ if hugo.Data.contact.email }}
    <div class="call-email">
      <a href="mailto:{{ hugo.Data.contact.email }}">{{ hugo.Data.contact.email }}</a>
    </div>
    {{ end }}
  </div>
</div>
