{{/* Renders the snowflake badge icon. Params: "width" int, "primary" string */}}
{{ $size := .width | default 32 }}
{{ $c := .primary | default "#0277BD" }}
<svg xmlns="http://www.w3.org/2000/svg" width="{{ $size }}" height="{{ $size }}" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="{{ $c }}"/>
  <line x1="16" y1="4" x2="16" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7.5" y1="7.5" x2="24.5" y2="24.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24.5" y1="7.5" x2="7.5" y2="24.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="4" x2="13" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="4" x2="19" y2="7" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="13" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="19" y2="25" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="7" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="7" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="25" y2="13" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="25" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
