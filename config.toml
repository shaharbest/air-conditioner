baseURL = "https://danielle.best/"
theme = "hugo-serif-theme"
languageCode = "en-us"
title = "Philly Green Clean"
timeZone = "America/New_York"

[params]
  google_analytics_id = ""
  google_tag_manager_id = ""
  favicon = "favicon-32x32.svg"
  description = "Philadelphia's trusted experts in air duct cleaning, dryer vent cleaning, and chimney cleaning. Serving Philly and surrounding areas."

  [params.homepage]
    sticky_header = true
    show_contact_box = true
    show_services_button = true

  [params.logo]
    mobile = "images/logo/logo-mobile.svg"
    mobile_height = "36px"
    desktop = "images/logo/logo.svg"
    desktop_height = "36px"
    alt = "Philly Green Clean"

  [params.fonts]
    google_fonts = "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;700&display=swap"
    heading = "Playfair Display"
    base = "Source Sans Pro"

  [params.colors]
    primary = "#2e7d32"
    black = "#2f2f41"
    white = "#ffffff"
    white_offset = "#f6f7ff"
    grey = "#5C5A5A"

  [params.seo]
    meta_og_image = "images/og-image.jpg"

  [params.services]
    summary_truncate = 120

  [params.footer]
    copyright_text = "Copyright &copy; 2024 Philly Green Clean LLC"

[menu]
  [[menu.main]]
    name = "Services"
    url = "/services/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 3

  [[menu.footer]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.footer]]
    name = "Services"
    url = "/services/"
    weight = 2

  [[menu.footer]]
    name = "Contact"
    url = "/contact/"
    weight = 3
