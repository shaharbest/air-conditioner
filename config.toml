baseURL = "https://phillygreenclean.com/"
theme = "hugo-serif-theme"
languageCode = "en-us"
title = "Philly Green Clean"
timeZone = "America/New_York"
enableGitInfo = true
disableKinds = ["taxonomy", "term"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  google_analytics_id = ""
  google_tag_manager_id = "GTM-NSV6FQWB"
  favicon = "images/favicon_io/favicon.ico"
  description = "Air duct, dryer vent, and chimney cleaning in the Philadelphia area. Residential and commercial service with reliable scheduling, fair pricing, and thorough cleaning."

  [params.homepage]
    sticky_header = true
    show_info_box = true

[params.fonts]
    google_fonts = "https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;700&display=swap"
    heading = "Playfair Display"
    base = "Source Sans Pro"

  [params.colors]
    # primary = "#0277BD"
    primary = "#629e27"
    black = "#1a2744"
    white = "#ffffff"
    # white_offset = "#e8f5fe"
    white_offset = "#f4f9ef"
    grey = "#546e7a"

  [params.seo]
    meta_og_image = "images/og-image.jpg"

[params.footer]
    copyright_text = "Copyright &copy; 2026 Philly Green Clean LLC"

[menu]
  [[menu.main]]
    name = "Services"
    url = "/#services"
    weight = 1

  [[menu.main]]
    name = "FAQ"
    url = "/faq/"
    weight = 3

  [[menu.main]]
    name = "Hours"
    url = "/#hours"
    weight = 4

  [[menu.footer]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.footer]]
    name = "Services"
    url = "/#services"
    weight = 2

  [[menu.footer]]
    name = "Hours"
    url = "/#hours"
    weight = 3

  [[menu.footer]]
    name = "FAQ"
    url = "/faq/"
    weight = 4
